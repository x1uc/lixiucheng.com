name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-whitespace:
    name: Check whitespace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check for trailing whitespace
        run: ./dev-scripts/check-trailing-whitespace

      - name: Check for trailing newlines
        run: ./dev-scripts/check-trailing-newline

  check-formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install npm packages
        run: npm ci

      - name: Check formatting
        run: ./dev-scripts/check-formatting

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install npm packages
        run: npm ci

      - name: Lint Markdown
        run: ./dev-scripts/lint-markdown

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.147.5

      - name: Restore generated resources cache
        uses: actions/cache@v5
        with:
          path: resources
          key: resources-gen-v1

      - name: Build prod site
        run: hugo version && hugo --minify

      - name: Upload generated site
        uses: actions/upload-artifact@v7
        with:
          name: public
          path: public
          if-no-files-found: error

  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest
    needs: build
    container:
      image: mtlynch/htmlproofer:5.0.6
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public

      - name: Check HTML and external links
        run: ./dev-scripts/lint-html

  lint-xml:
    name: Lint XML
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install --yes libxml2-utils

      - name: Lint XML
        run: ./dev-scripts/lint-xml

  check-seo-metadata:
    name: Check SEO metadata
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public

      - name: Check that SEO meta tags rendered properly
        run: ./dev-scripts/check-seo-metadata

  publish-draft:
    name: Publish draft
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    concurrency:
      group: cloudflare-pages-draft
      cancel-in-progress: false
    steps:
      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Remove base tag from generated HTML
        run: find public -name "*.html" -exec sed -i -e 's/<base[^>]*>//g' {} +

      - name: Deploy to draft
        run: npx wrangler@4.20.5 pages deploy public --project-name=xiuc --branch=draft
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - check-whitespace
      - check-formatting
      - lint-markdown
      - build
      - check-seo-metadata
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: cloudflare-pages-production
      cancel-in-progress: false
    steps:
      - name: Download generated site
        uses: actions/download-artifact@v8
        with:
          name: public
          path: public

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Deploy to production
        run: npx wrangler@4.20.5 pages deploy public --project-name=xiuc --branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
